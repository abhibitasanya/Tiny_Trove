databases:
  - name: tiny-trove-db
    databaseName: tiny_trove
    user: tiny_trove_user

services:
  - type: web
    name: tiny-trove
    env: docker
    plan: free
    autoDeploy: true
    healthCheckPath: /home.php
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: tiny-trove-db
          property: connectionString